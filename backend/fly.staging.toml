app = "java-interwiew-tinder-staging-1"
primary_region = "fra"

[build]

[env]
  NODE_ENV = "staging"
  PORT     = "3000"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = true     # save cost on staging
  auto_start_machines = true
  min_machines_running = 0       # can sleep on staging

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    port         = 3000
    timeout      = "5s"
    type         = "http"