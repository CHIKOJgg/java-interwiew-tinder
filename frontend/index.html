<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />

  <!--
      FIX 4: Telegram WebView on iOS ignores the viewport unless these are set.
      - width=device-width: prevents the 980px desktop layout zoom
      - initial-scale=1.0: no zoom on open
      - viewport-fit=cover: extends into notch/safe area on iPhone
      - user-scalable=no: prevents pinch-zoom breaking card swipe gestures
    -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#5c7cfa" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Open Graph / social share preview -->
  <meta name="description" content="Swipe through real Java, Python & TypeScript interview questions, get instant AI breakdowns of what you don't know, and track your readiness score. Free to start — 10 min/day." />
  <meta property="og:title" content="Don't fail your Java interview — practice 10 min/day" />
  <meta property="og:description" content="Swipe through real interview questions, get an instant AI breakdown of everything you don't know, and track your readiness score. Java, Python & TypeScript. Free to start." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Don't fail your Java interview — practice 10 min/day" />
  <meta name="twitter:description" content="Swipe real interview questions, get instant AI breakdowns of what you don't know, track your readiness score. Free to start." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Google One Tap (web login). Harmless if VITE_GOOGLE_CLIENT_ID unset. -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!--
      Load Telegram WebApp script BEFORE your React bundle.
      Without this, window.Telegram is undefined when main.jsx runs,
      and the polling in getTelegramInitData has to wait for it to inject.
      Loading it here ensures window.Telegram.WebApp is available immediately.
     -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <title>Interview Tinder — practice for your Java interview, 10 min/day</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />

  <!-- Google Analytics 4 (no-op until VITE_GA_MEASUREMENT_ID is set at build) -->
  <script>
    (function () {
      var id = window.__JIT_GA_ID__ || '%VITE_GA_MEASUREMENT_ID%';
      if (!id || id.indexOf('%') === 0 || id.indexOf('G-') !== 0) return;
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', id);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
